name: Release Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop-official/package-lock.json
            client/Cli-Proxy-API-Management-Center/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          npm --prefix client/Cli-Proxy-API-Management-Center ci
          npm --prefix desktop-official ci

      - name: Build backend executable
        run: |
          go build -o desktop-official/src-tauri/bin/cliproxyapi.exe ./cmd/server

      - name: Verify backend executable runs
        shell: pwsh
        run: |
          $exe = "desktop-official/src-tauri/bin/cliproxyapi.exe"
          if (!(Test-Path $exe)) {
            throw "backend executable missing: $exe"
          }
          $p = Start-Process -FilePath $exe -ArgumentList "-h" -NoNewWindow -PassThru -Wait
          if ($p.ExitCode -ne 0) {
            throw "backend executable smoke test failed with exit code $($p.ExitCode)"
          }

      - name: Build Tauri bundle
        run: |
          cd desktop-official
          npm run tauri -- build --target x86_64-pc-windows-msvc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            desktop-official/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-official/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop-official/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
